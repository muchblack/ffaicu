{% extends "base_rpg.html" %}
{% block title %}註冊 - FF ADVENTURE{% endblock %}
{% block content %}
<header class="fantasy-border mb-6">
  <h1 class="section-title text-3xl"><span class="material-symbols-outlined">person_add</span> 建立角色</h1>
</header>

<section class="fantasy-border">
  <form action="/view/register" method="post" class="space-y-4" style="max-width:480px;">
    <div>
      <label class="text-xs text-gold font-bold">帳號 (4-32字, 英數字)</label>
      <input name="id" required minlength="4" maxlength="32" pattern="[a-zA-Z0-9]+" class="rpg-input w-full">
    </div>
    <div>
      <label class="text-xs text-gold font-bold">密碼 (4-32字)</label>
      <input name="password" type="password" required minlength="4" maxlength="32" class="rpg-input w-full">
    </div>
    <div>
      <label class="text-xs text-gold font-bold">密語</label>
      <input name="password_recovery" required class="rpg-input w-full">
    </div>
    <div>
      <label class="text-xs text-gold font-bold">角色名</label>
      <input name="name" required maxlength="64" class="rpg-input w-full">
    </div>
    <div>
      <label class="text-xs text-gold font-bold">性別</label>
      <select name="sex" class="rpg-select w-full">
        <option value="1">男</option>
        <option value="0">女</option>
      </select>
    </div>
    <div>
      <label class="text-xs text-gold font-bold">初始職業</label>
      <select name="job_class" class="rpg-select w-full">
        <option value="0">戰士</option>
        <option value="1">黑魔導士</option>
        <option value="2">白魔導士</option>
        <option value="3">盜賊</option>
      </select>
    </div>
    <div class="flex gap-3 mt-4">
      <button class="rpg-btn rpg-btn-rich" type="submit">註冊</button>
      <a href="/" class="rpg-btn">返回</a>
    </div>
  </form>
</section>
{% endblock %}
