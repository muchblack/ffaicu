{% extends "base_rpg.html" %}
{% block title %}排行榜{% endblock %}
{% block content %}
<header class="fantasy-border mb-6">
  <h1 class="section-title text-3xl"><span class="material-symbols-outlined">leaderboard</span> 排行榜</h1>
  <div class="flex flex-wrap gap-2 mt-4">
    {% for cat in categories %}
    <a href="/view/ranking?category={{ cat }}" class="rpg-btn {% if cat == current %}rpg-btn-rich{% endif %}">{{ cat }}</a>
    {% endfor %}
  </div>
</header>

<section class="fantasy-border mb-6">
  <table class="rpg-table">
    <thead><tr><th style="width:3rem;">#</th><th>名稱</th><th>Lv</th><th>{{ current }}</th></tr></thead>
    <tbody>
    {% for r in rankings %}
    <tr>
      <td class="text-gold font-bold">{{ r.rank }}</td>
      <td class="font-bold">{{ r.name }}</td>
      <td>{{ r.level }}</td>
      <td class="font-mono">{{ r.value }}</td>
    </tr>
    {% endfor %}
    </tbody>
  </table>
</section>

<a href="/view/status" class="rpg-btn"><span class="material-symbols-outlined">arrow_back</span> 返回</a>
{% endblock %}
