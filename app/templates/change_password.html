{% extends "base_rpg.html" %}
{% block title %}修改密碼 - FF ADVENTURE{% endblock %}
{% block content %}
<header class="fantasy-border mb-6">
  <h1 class="section-title text-3xl"><span class="material-symbols-outlined">lock</span> 修改密碼</h1>
</header>

{% if error %}
<div class="fantasy-border mb-6" style="border-color:rgba(239,68,68,0.5);">
  <p class="msg-error font-bold">{{ error }}</p>
</div>
{% endif %}

{% if success %}
<div class="fantasy-border mb-6" style="border-color:rgba(34,197,94,0.5);">
  <p class="msg-success font-bold">{{ success }}</p>
</div>
{% endif %}

<section class="fantasy-border mb-6" style="max-width:400px;">
  <form method="post" action="/view/change-password" class="space-y-4">
    <div>
      <label class="text-xs text-gold font-bold">目前密碼</label>
      <input type="password" name="current_password" required minlength="4" maxlength="32" class="rpg-input w-full">
    </div>
    <div>
      <label class="text-xs text-gold font-bold">密語</label>
      <input type="text" name="recovery_word" required class="rpg-input w-full">
    </div>
    <div>
      <label class="text-xs text-gold font-bold">新密碼</label>
      <input type="password" name="new_password" required minlength="4" maxlength="32" class="rpg-input w-full">
    </div>
    <div>
      <label class="text-xs text-gold font-bold">確認新密碼</label>
      <input type="password" name="confirm_password" required minlength="4" maxlength="32" class="rpg-input w-full">
    </div>
    <button type="submit" class="rpg-btn rpg-btn-rich">變更密碼</button>
  </form>
</section>

<a href="/view/status" class="rpg-btn"><span class="material-symbols-outlined">arrow_back</span> 返回狀態頁</a>
{% endblock %}
